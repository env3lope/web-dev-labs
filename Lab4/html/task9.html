<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab4</title>
    <script src="../task9.js" defer></script>
    <style>
        .container {
            width: 320px;
            padding: 10px;
        }

        h3 {
            text-align: center;
            color: red;
            margin: 10px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            background: #f8f8f8;
        }

        td,
        th {
            border: 1px dashed #999;
            padding: 6px;
            text-align: left;
        }

        button {
            width: 100%;
            padding: 4px;
            background: #dbe6f3;
            border: 1px solid #7fa1c3;
            cursor: pointer;
        }

        button:hover {
            background: #c9d9ec;
        }
    </style>
</head>

<body>
    <div class="container">
        <h3>Список товарів:</h3>
        <table id="products">
            <tr>
                <td>Брюки</td>
                <td><button>Замовити</button></td>
            </tr>
            <tr>
                <td>Сорочка</td>
                <td><button>Замовити</button></td>
            </tr>
            <tr>
                <td>Шорти</td>
                <td><button>Замовити</button></td>
            </tr>
            <tr>
                <td>Туфлі</td>
                <td><button>Замовити</button></td>
            </tr>
        </table>

        <h3>Кошик:</h3>
        <table id="cart">
            <tr>
                <th>Товар</th>
                <th>Кількість</th>
            </tr>
        </table>
    </div>
</body>

</html>
